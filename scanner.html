<!DOCTYPE html>
<html>
<head>

<title>SCAN ABSENSI SISWA</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f6f9;
}

video{
width:320px;
border-radius:10px;
}

#hasil{
font-size:22px;
margin-top:20px;
color:green;
font-weight:bold;
}

img{
margin-top:15px;
border-radius:10px;
}

</style>

</head>

<body>

<h2>SCAN ABSENSI SISWA</h2>

<button onclick="startCamera()">AKTIFKAN KAMERA</button>

<br><br>

<video id="video"></video>

<div id="hasil">Menunggu scan...</div>

<img id="foto" width="120">

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

const API="https://script.google.com/macros/s/AKfycbzttBMrzuGxWOyXJWO7HMPAP1Friy5p2lsfCF09iQ32XOhNL-yGQ6iSi4QeVv6wTO4Zxg/exec";

let codeReader;
let scanning=true;

function startCamera(){

codeReader=new ZXing.BrowserBarcodeReader();

codeReader.decodeFromVideoDevice(null,'video',(result,err)=>{

if(result && scanning){

scanning=false;

document.getElementById("hasil").innerHTML="Scanning...";

fetch(API+"?barcode="+result.text)
.then(res=>res.json())
.then(data=>{

document.getElementById("hasil").innerHTML=data.message;

if(data.foto){
document.getElementById("foto").src=data.foto;
}

document.getElementById("beep").play();

setTimeout(()=>{
scanning=true;
},3000);

});

}

});

}

</script>

</body>
</html>
